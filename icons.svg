<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- chai: cutting chai tumbler -->
  <symbol id="i-chai" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 8 L8 20 L16 20 L17 8"/>
    <line x1="6" y1="8" x2="18" y2="8"/>
    <path d="M17 11 L20 11 L20 15 L17 15"/>
    <path d="M10 5 Q10.5 3, 11.5 4"/>
    <path d="M13 5 Q13.5 3, 14.5 4"/>
  </symbol>
  <!-- auto-rickshaw -->
  <symbol id="i-rick" viewBox="0 0 28 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 14 L4 8 L8 4 L12 4 L12 8 L22 8 L24 14"/>
    <line x1="4" y1="14" x2="24" y2="14"/>
    <circle cx="8" cy="15" r="2"/>
    <circle cx="21" cy="15" r="2"/>
    <line x1="12" y1="4" x2="12" y2="14"/>
    <path d="M14 8 L14 11 L19 11 L19 8"/>
  </symbol>
  <!-- biryani handi: round pot with steam -->
  <symbol id="i-biryani" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 11 Q5 18, 12 19 Q19 18, 19 11"/>
    <line x1="5" y1="11" x2="19" y2="11"/>
    <path d="M8 11 L7 9 L17 9 L16 11"/>
    <path d="M10 6 Q10 4, 11 5"/>
    <path d="M14 6 Q14 4, 15 5"/>
    <path d="M12 5 Q12 3, 13 4"/>
  </symbol>
  <!-- metro token: circle with M -->
  <symbol id="i-metro" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <path d="M7 16 L7 8 L12 13 L17 8 L17 16"/>
  </symbol>
  <!-- coffee: NYC paper cup -->
  <symbol id="i-coffee" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M7 9 L17 9 L16 21 L8 21 Z"/>
    <line x1="6" y1="9" x2="18" y2="9"/>
    <path d="M10 5 Q10 3, 11 3 Q11 5, 12 5 Q12 3, 13 3"/>
  </symbol>
  <!-- spark: four-point star -->
  <symbol id="i-spark" viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <path d="M12 2 L13.5 9.5 L21 12 L13.5 14.5 L12 22 L10.5 14.5 L3 12 L10.5 9.5 Z"/>
  </symbol>
  <!-- code: angle brackets -->
  <symbol id="i-code" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="8 6 2 12 8 18"/>
    <polyline points="16 6 22 12 16 18"/>
    <line x1="14" y1="4" x2="10" y2="20"/>
  </symbol>
  <!-- pen: writing icon -->
  <symbol id="i-pen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 3 L21 7 L8 20 L3 21 L4 16 Z"/>
    <line x1="14" y1="6" x2="18" y2="10"/>
  </symbol>
</svg>
