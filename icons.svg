<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <defs>
    <!-- code: angle brackets with slash -->
    <symbol id="i-code" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="8 6 2 12 8 18"/>
      <polyline points="16 6 22 12 16 18"/>
      <line x1="14" y1="4" x2="10" y2="20"/>
    </symbol>
    <!-- data-flow: pipeline / connected nodes -->
    <symbol id="i-flow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="5" cy="6" r="2.5"/>
      <circle cx="19" cy="6" r="2.5"/>
      <circle cx="12" cy="18" r="2.5"/>
      <line x1="7" y1="7.5" x2="10" y2="16"/>
      <line x1="17" y1="7.5" x2="14" y2="16"/>
    </symbol>
    <!-- terminal: command prompt -->
    <symbol id="i-terminal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="4" width="20" height="16" rx="2"/>
      <polyline points="7 10 10 13 7 16"/>
      <line x1="13" y1="16" x2="17" y2="16"/>
    </symbol>
    <!-- spark: four-point star -->
    <symbol id="i-spark" viewBox="0 0 24 24" fill="currentColor" stroke="none">
      <path d="M12 2 L13.5 9.5 L21 12 L13.5 14.5 L12 22 L10.5 14.5 L3 12 L10.5 9.5 Z"/>
    </symbol>
    <!-- circuit: node with connections -->
    <symbol id="i-circuit" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="2" x2="12" y2="9"/>
      <line x1="12" y1="15" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="9" y2="12"/>
      <line x1="15" y1="12" x2="22" y2="12"/>
    </symbol>
    <!-- book: open book -->
    <symbol id="i-book" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 4 Q7 3, 12 5 Q17 3, 22 4 L22 19 Q17 18, 12 20 Q7 18, 2 19 Z"/>
      <line x1="12" y1="5" x2="12" y2="20"/>
    </symbol>
    <!-- coffee: keeping one version for selective use -->
    <symbol id="i-coffee" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M6 9 L18 9 L17 21 L7 21 Z"/>
      <line x1="6" y1="9" x2="18" y2="9"/>
      <path d="M9 5 Q9 3, 10 3 Q10 5, 11 5 Q11 3, 12 3"/>
      <path d="M13 5 Q13 3, 14 3 Q14 5, 15 5 Q15 3, 16 3"/>
    </symbol>
    <!-- pen: writing instrument -->
    <symbol id="i-pen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3 L21 7 L8 20 L3 21 L4 16 Z"/>
      <line x1="14" y1="6" x2="18" y2="10"/>
    </symbol>
  </defs>
</svg>
